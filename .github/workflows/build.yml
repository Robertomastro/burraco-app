name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verifica path expo CLI
        run: |
          echo "Cerco expo CLI..."
          find node_modules -name "cli.js" -path "*/expo/*" 2>/dev/null | head -5
          ls node_modules/.bin/ | grep expo || true

      - name: Genera progetto Android nativo (prebuild)
        run: |
          if [ -f "node_modules/@expo/cli/build/bin/cli" ]; then
            node node_modules/@expo/cli/build/bin/cli prebuild --platform android --clean
          elif [ -f "node_modules/expo/bin/expo.js" ]; then
            node node_modules/expo/bin/expo.js prebuild --platform android --clean
          else
            npx expo prebuild --platform android --clean
          fi
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Rendi eseguibile gradlew e hermesc
        run: |
          chmod +x android/gradlew
          find node_modules/react-native/sdks/hermesc -type f | xargs chmod +x 2>/dev/null || true

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Trova APK
        run: find android/app/build/outputs -name "*.apk" 2>/dev/null

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: burraco-app-${{ github.run_number }}
          path: android/app/build/outputs/apk/**/*.apk
          retention-days: 30
