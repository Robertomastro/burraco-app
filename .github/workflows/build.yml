name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Genera progetto Android nativo (prebuild)
        run: |
          if [ -f "node_modules/@expo/cli/build/bin/cli" ]; then
            node node_modules/@expo/cli/build/bin/cli prebuild --platform android --clean
          elif [ -f "node_modules/expo/bin/expo.js" ]; then
            node node_modules/expo/bin/expo.js prebuild --platform android --clean
          else
            npx expo prebuild --platform android --clean
          fi
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Rendi eseguibile gradlew e hermesc
        run: |
          chmod +x android/gradlew
          find node_modules/react-native/sdks/hermesc -type f | xargs chmod +x 2>/dev/null || true

      - name: Genera debug keystore per firma
        run: |
          keytool -genkeypair \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Burraco, OU=App, O=Roberto, L=Roma, ST=Lazio, C=IT"

      - name: Build APK firmata
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Trova APK
        run: find android/app/build/outputs -name "*.apk" 2>/dev/null

      - name: Carica APK installabile
        uses: actions/upload-artifact@v4
        with:
          name: burraco-app-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
