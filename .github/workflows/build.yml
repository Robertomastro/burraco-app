name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Genera progetto Android nativo (prebuild)
        run: |
          if [ -f "node_modules/@expo/cli/build/bin/cli" ]; then
            node node_modules/@expo/cli/build/bin/cli prebuild --platform android --clean
          elif [ -f "node_modules/expo/bin/expo.js" ]; then
            node node_modules/expo/bin/expo.js prebuild --platform android --clean
          else
            npx expo prebuild --platform android --clean
          fi
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Rendi eseguibile gradlew e hermesc
        run: |
          chmod +x android/gradlew
          find node_modules/react-native/sdks/hermesc -type f | xargs chmod +x 2>/dev/null || true

      - name: Genera keystore per firma release
        run: |
          keytool -genkeypair \
            -keystore burraco-release.keystore \
            -storepass burraco123 \
            -alias burraco-key \
            -keypass burraco123 \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Burraco,O=Roberto,C=IT"

      - name: Configura firma in gradle.properties
        run: |
          cat >> android/gradle.properties << 'PROPS'
          MYAPP_UPLOAD_STORE_FILE=../../burraco-release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=burraco-key
          MYAPP_UPLOAD_STORE_PASSWORD=burraco123
          MYAPP_UPLOAD_KEY_PASSWORD=burraco123
          PROPS

      - name: Configura signing config in build.gradle
        run: |
          # Aggiunge signingConfigs release all'app build.gradle
          sed -i 's/signingConfigs {/signingConfigs {\n        release {\n            storeFile file(MYAPP_UPLOAD_STORE_FILE)\n            storePassword MYAPP_UPLOAD_STORE_PASSWORD\n            keyAlias MYAPP_UPLOAD_KEY_ALIAS\n            keyPassword MYAPP_UPLOAD_KEY_PASSWORD\n        }/' android/app/build.gradle
          # Usa la signing config release nella build release
          sed -i 's/buildTypes {/buildTypes {\n        release {\n            signingConfig signingConfigs.release\n        }/' android/app/build.gradle

      - name: Build APK release firmata
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Trova APK
        run: find android/app/build/outputs -name "*.apk"

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: burraco-app-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
