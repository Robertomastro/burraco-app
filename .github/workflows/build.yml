name: Build Android APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installa dipendenze npm
        run: npm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Genera progetto Android nativo (prebuild)
        run: |
          if [ -f "node_modules/@expo/cli/build/bin/cli" ]; then
            node node_modules/@expo/cli/build/bin/cli prebuild --platform android --clean
          elif [ -f "node_modules/expo/bin/expo.js" ]; then
            node node_modules/expo/bin/expo.js prebuild --platform android --clean
          else
            npx expo prebuild --platform android --clean
          fi
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Rendi eseguibile gradlew e hermesc
        run: |
          chmod +x android/gradlew
          find node_modules/react-native/sdks/hermesc -type f | xargs chmod +x 2>/dev/null || true

      - name: Genera keystore
        run: |
          keytool -genkeypair \
            -keystore burraco.keystore \
            -storepass burraco123 \
            -alias burraco \
            -keypass burraco123 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Burraco,O=Roberto,C=IT"

      - name: Configura signing con Python
        run: |
          python3 << 'PYEOF'
          import re, os

          # Scrivi keystore.properties
          with open('android/keystore.properties', 'w') as f:
              f.write('storeFile=../../burraco.keystore\n')
              f.write('storePassword=burraco123\n')
              f.write('keyAlias=burraco\n')
              f.write('keyPassword=burraco123\n')

          # Leggi build.gradle
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # Aggiungi lettura keystore.properties prima di android {
          props_block = '''
def keystoreProps = new Properties()
def keystoreFile = rootProject.file('keystore.properties')
if (keystoreFile.exists()) { keystoreProps.load(new FileInputStream(keystoreFile)) }

'''
          if 'keystoreProps' not in content:
              content = props_block + content

          # Aggiungi signingConfigs dentro android { prima di buildTypes
          signing_config = '''
      signingConfigs {
          release {
              storeFile keystoreProps['storeFile'] ? file(keystoreProps['storeFile']) : null
              storePassword keystoreProps['storePassword']
              keyAlias keystoreProps['keyAlias']
              keyPassword keystoreProps['keyPassword']
          }
      }
'''
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_config + '    buildTypes {')

          # Aggiungi signingConfig alla release buildType
          if 'signingConfig signingConfigs.release' not in content:
              content = re.sub(
                  r'(buildTypes\s*\{[^}]*release\s*\{)',
                  r'\1\n                signingConfig signingConfigs.release',
                  content, flags=re.DOTALL
              )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle aggiornato OK")
          PYEOF

      - name: Build APK release
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Trova APK
        run: find android/app/build/outputs -name "*.apk"

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: burraco-app-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
